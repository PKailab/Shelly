plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.terminalview'
version = '0.1.0'

android {
  namespace "expo.modules.terminalview"

  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }

  sourceSets {
    main {
      assets.srcDirs += 'src/main/assets'
    }
  }

  lint {
    abortOnError false
  }
}

dependencies {
  implementation project(':terminal-emulator')
}
